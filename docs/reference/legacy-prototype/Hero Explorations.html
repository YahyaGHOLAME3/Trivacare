<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Trivacare — Hero Explorations</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: { extend: {
      fontFamily: {
        display: ['"Bricolage Grotesque"','system-ui','sans-serif'],
        sans: ['"Hanken Grotesk"','system-ui','sans-serif'],
        mono: ['"JetBrains Mono"','ui-monospace','monospace'],
      },
      colors: {
        brand: { 50:'#eef4ff',100:'#dbe7ff',200:'#bcd2ff',300:'#8eb2ff',400:'#5887f7',500:'#2f63ea',600:'#0052cc',700:'#0042a6',800:'#063785',900:'#0a316c',950:'#071f47' },
        teal: { 50:'#eafaf6',100:'#cdf2e7',200:'#9fe5d3',300:'#66d2ba',400:'#33b89c',500:'#149a82',600:'#0a7d6b',700:'#0a6356',800:'#0b4f46',900:'#0b413b',950:'#04231f' },
        ink: '#0b1524',
      },
      boxShadow: {
        soft: '0 1px 2px rgba(11,21,36,.04), 0 8px 24px -8px rgba(11,21,36,.10)',
        lift: '0 2px 6px rgba(11,21,36,.05), 0 24px 48px -16px rgba(11,21,36,.18)',
        glow: '0 8px 28px -6px rgba(0,82,204,.45)',
      },
    }},
  };
</script>
<style>
  body { font-family:"Hanken Grotesk",system-ui,sans-serif; color:#0b1524; }
  h1,h2,h3,h4 { font-family:"Bricolage Grotesque",system-ui,sans-serif; letter-spacing:-0.02em; }
  .grain { background-image: radial-gradient(circle at 1px 1px, rgba(11,21,36,.05) 1px, transparent 0); background-size: 22px 22px; }
  .flip-x {}
  /* logical-prop helpers used by variants */
  .rounded-bs-sm { border-start-start-radius: .25rem; }
  .rounded-be-sm { border-end-end-radius: .25rem; }
  @keyframes floaty { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-9px)} }
  @keyframes pulse-ring { 0%{transform:scale(.9);opacity:.7} 70%{transform:scale(1.8);opacity:0} 100%{transform:scale(1.8);opacity:0} }
  @media (prefers-reduced-motion: reduce){ *{animation-duration:.001ms!important} }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="icons.js"></script>
  <script src="icons-extra.js"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="hero-variants.jsx"></script>
  <script type="text/babel">
    function ExploreApp() {
      return (
        <DesignCanvas title="Trivacare — Hero concepts" subtitle="Three directions to replace the floating-card hero · click any board to focus">
          <DCSection id="heroes" title="Hero Section" subtitle="Pick a direction — each is a full desktop hero (1180×680)">
            <DCArtboard id="console" label="A · Console de coordination" width={1180} height={680}><HeroConsole /></DCArtboard>
            <DCArtboard id="editorial" label="B · Éditorial plein cadre" width={1180} height={680}><HeroEditorial /></DCArtboard>
            <DCArtboard id="network" label="C · Réseau national" width={1180} height={680}><HeroNetwork /></DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<ExploreApp />);
  </script>
</body>
</html>
